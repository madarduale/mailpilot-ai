name: mailpilot-ai

x-backend-environment: &backend-environment
  DJANGO_SETTINGS_MODULE: config.settings.local
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-only-change-before-deployment}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-jwt-key-change-before-deployment}
  DEBUG: "true"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,nginx,.ngrok-free.dev,.ngrok-free.app
  DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://localhost:8080,https://*.ngrok-free.dev,https://*.ngrok-free.app
  CORS_ALLOWED_ORIGINS: http://localhost:8081,http://localhost:19006
  CORS_ALLOW_CREDENTIALS: "false"
  DATABASE_URL: postgresql://${POSTGRES_USER:-mailpilot}:${POSTGRES_PASSWORD:-mailpilot}@db:5432/${POSTGRES_DB:-mailpilot}
  REDIS_URL: redis://redis:6379/0
  REDIS_CACHE_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/2
  CELERY_RESULT_BACKEND: redis://redis:6379/3
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/v1/oauth/gmail/callback/}
  GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid,https://www.googleapis.com/auth/userinfo.email,https://www.googleapis.com/auth/userinfo.profile,https://www.googleapis.com/auth/gmail.modify}
  GOOGLE_OAUTH_CLOCK_SKEW_SECONDS: ${GOOGLE_OAUTH_CLOCK_SKEW_SECONDS:-30}
  GOOGLE_OAUTH_STATE_TTL_SECONDS: ${GOOGLE_OAUTH_STATE_TTL_SECONDS:-600}
  GOOGLE_API_TIMEOUT_SECONDS: ${GOOGLE_API_TIMEOUT_SECONDS:-30}
  OAUTH_MOBILE_REDIRECT_SCHEMES: ${OAUTH_MOBILE_REDIRECT_SCHEMES:-mailpilot}
  OAUTH_TOKEN_ENCRYPTION_KEYS: ${OAUTH_TOKEN_ENCRYPTION_KEYS:-}
  AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-openrouter}
  AI_AUDIO_PROVIDER: ${AI_AUDIO_PROVIDER:-openrouter}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_RESPONSES_MODEL: ${OPENROUTER_RESPONSES_MODEL:-openai/gpt-5.6-terra}
  OPENROUTER_TRANSCRIPTION_MODEL: ${OPENROUTER_TRANSCRIPTION_MODEL:-openai/whisper-1}
  OPENROUTER_TTS_MODEL: ${OPENROUTER_TTS_MODEL:-x-ai/grok-voice-tts-1.0}
  OPENROUTER_TTS_FALLBACK_MODELS: ${OPENROUTER_TTS_FALLBACK_MODELS:-hexgrad/kokoro-82m,mistralai/voxtral-mini-tts-2603}
  OPENROUTER_TTS_VOICE: ${OPENROUTER_TTS_VOICE:-Eve}
  OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
  OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-MailPilot AI}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  OPENAI_RESPONSES_MODEL: ${OPENAI_RESPONSES_MODEL:-gpt-5.6-terra}
  OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
  OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
  AI_CONNECT_TIMEOUT_SECONDS: ${AI_CONNECT_TIMEOUT_SECONDS:-5}
  AI_READ_TIMEOUT_SECONDS: ${AI_READ_TIMEOUT_SECONDS:-60}
  AI_WRITE_TIMEOUT_SECONDS: ${AI_WRITE_TIMEOUT_SECONDS:-30}
  AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
  AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-512}
  NEW_EMAIL_NOTIFICATION_MAX_AGE_SECONDS: ${NEW_EMAIL_NOTIFICATION_MAX_AGE_SECONDS:-900}
  EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-backend-service: &backend-service
  build:
    context: backend
    dockerfile: ../infrastructure/docker/backend/Dockerfile
    target: development
  image: mailpilot-backend:development
  environment: *backend-environment
  restart: unless-stopped
  init: true
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - mailpilot

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailpilot}
      POSTGRES_USER: ${POSTGRES_USER:-mailpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailpilot}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - mailpilot

  redis:
    image: redis:7.4-alpine
    # Local cache, Channels, and Celery state is reconstructible. Disabling disk
    # persistence avoids Docker Desktop fsync stalls; production should use a
    # managed Redis service with persistence configured by the provider.
    command:
      - redis-server
      - --appendonly
      - "${REDIS_APPENDONLY:-no}"
      - --save
      - ""
      - --maxmemory-policy
      - noeviction
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks:
      - mailpilot

  backend:
    <<: *backend-service
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "true"
      COLLECT_STATIC: "false"
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - static-data:/app/staticfiles
      - media-data:/app/media
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/api/v1/health/ready/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    <<: *backend-service
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO", "--concurrency=2"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$${HOSTNAME} --timeout=5 | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  scheduler:
    <<: *backend-service
    command: ["celery", "-A", "config", "beat", "--loglevel=INFO", "--schedule=/tmp/celerybeat-schedule"]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static-data:/app/staticfiles:ro
      - media-data:/app/media:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/live/"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - mailpilot

  test:
    <<: *backend-service
    profiles: ["test"]
    environment:
      <<: *backend-environment
      DJANGO_SETTINGS_MODULE: config.settings.test
    command: ["python", "-m", "pytest", "-q"]
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  static-data:
  media-data:

networks:
  mailpilot:
    driver: bridge
